name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag
        required: false
        default: staging
      deploy_remote:
        description: SSH deploy to staging VPS (requires secrets)
        type: boolean
        default: false
  push:
    branches: [staging]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate production env schema
        run: npm run validate:production-env
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://ci:ci@postgres:5432/pranidoctor?sslmode=disable
          REDIS_ENABLED: "true"
          REDIS_URL: redis://redis:6379
          ADMIN_JWT_SECRET: ci-staging-admin-jwt-secret-min-32-chars
          MOBILE_JWT_SECRET: ci-staging-mobile-jwt-secret-min-32-chars
          DOCTOR_JWT_SECRET: ci-staging-doctor-jwt-secret-min-32-chars
          TECHNICIAN_JWT_SECRET: ci-staging-tech-jwt-secret-min-32-chars
          MOBILE_REFRESH_SECRET: ci-staging-refresh-secret-min-32-chars
          REFRESH_TOKEN_PEPPER: ci-staging-pepper-min-32-chars
          OTP_MODE: live
          SKIP_STARTUP_VALIDATION: "true"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag || 'staging' }}

      - name: Deploy to staging VPS
        if: github.event_name == 'workflow_dispatch' && inputs.deploy_remote
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            ./scripts/backup/postgres-backup.sh /var/backups/pranidoctor || true
            export ALLOW_PRODUCTION_MIGRATE=true
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm api npm run db:migrate:deploy
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d api
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3000/ready >/dev/null; then
                echo "Staging API ready"
                exit 0
              fi
              sleep 2
            done
            echo "Health gate failed" >&2
            exit 1

      - name: Deploy skipped (configure secrets)
        if: github.event_name != 'workflow_dispatch' || !inputs.deploy_remote
        run: |
          echo "Image pushed to GHCR. Re-run workflow with deploy_remote=true after configuring DEPLOY_* secrets."
