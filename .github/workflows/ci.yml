name: Backend CI

on:
  push:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'eslint.config.js'
      - 'package.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'eslint.config.js'
      - 'package.json'
      - '.github/workflows/ci.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run ci:validate
      - run: npm run ci:validate
      - run: npm test -- --run src/shared/config/mobile-profile-startup.test.ts src/api/health/mobile-health.service.test.ts src/modules/profile/mobile-me.contract.test.ts
        env:
          MOBILE_JWT_SECRET: ci-test-mobile-jwt-secret-32chars-min
          AUTH_SECRET: ci-test-mobile-jwt-secret-32chars-min
          NODE_ENV: test
