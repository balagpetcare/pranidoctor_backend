version: '3.9'

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 15s

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: pranidoctor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pranidoctor}
      POSTGRES_USER: ${DB_USER:-pranidoctor}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pranidoctor_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    healthcheck:
      <<: *healthcheck-defaults
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1']
    networks:
      - backend

  # ============================================
  # Redis Cache & Queue
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: pranidoctor-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      <<: *healthcheck-defaults
      test: ['CMD', 'redis-cli', 'ping']
    networks:
      - backend

  # ============================================
  # MinIO (S3-compatible object storage)
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: pranidoctor-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      <<: *healthcheck-defaults
      interval: 15s
      start_period: 20s
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:9000/minio/health/live']
    networks:
      - backend

  minio-init:
    image: minio/mc:latest
    container_name: pranidoctor-minio-init
    restart: 'no'
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/$${S3_BUCKET:-pranidoctor-dev};
      echo 'MinIO bucket ready';
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-pranidoctor-dev}
    networks:
      - backend

  # ============================================
  # API Application (production profile)
  # ============================================
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: pranidoctor-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-pranidoctor}
      DB_USER: ${DB_USER:-pranidoctor}
      DB_PASSWORD: ${DB_PASSWORD:-pranidoctor_dev_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_HOST: minio
      MINIO_PORT: 9000
      S3_ENDPOINT: http://minio:9000
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - backend
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  backend:
    driver: bridge
