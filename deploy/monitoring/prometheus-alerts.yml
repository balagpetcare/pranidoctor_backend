groups:
  - name: pranidoctor-api
    rules:
      - alert: ApiDown
        expr: up{job="pranidoctor-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Prani Doctor API unreachable

      - alert: ApiReadinessFailed
        expr: pranidoctor_ready == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: API /ready failing

      - alert: High5xxRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Elevated 5xx error rate

      - alert: RedisUnavailable
        expr: pranidoctor_redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Redis down — rate limits fail closed
